<!DOCTYPE html>
<html>
<head>
    <title>Order Tracking</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            text-align: center;
            margin-top: 80px;
        }

        .container {
            background: white;
            padding: 30px;
            width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 20px;
            text-align: left;
        }

        .loading { color: orange; }
        .error { color: red; }
        .success { color: green; }

        .order-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            background: #fafafa;
        }

        .track-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 10px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 13px;
        }

        .track-btn:hover {
            background: #218838;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Track Your Order</h2>

    <input type="text" id="inputData" placeholder="Enter Mobile or Email">
    <br>
    <button onclick="searchData()">Search</button>

    <div id="result"></div>
</div>

<script>
async function searchData() {
    let input = document.getElementById("inputData").value.trim();
    let resultDiv = document.getElementById("result");

    if (input === "") {
        resultDiv.innerHTML = "<p class='error'>Please enter mobile or email</p>";
        return;
    }

    resultDiv.innerHTML = "<p class='loading'>Searching...</p>";

    try {
        let response = await fetch("https://sheet-bot-sfuv.onrender.com/search", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ query: input })
        });

        let data = await response.json();

        if (data.status === "Not Found") {
            resultDiv.innerHTML = "<p class='error'>No order found</p>";
            return;
        }

        if (!data.orders || data.orders.length === 0) {
            resultDiv.innerHTML = "<p class='error'>No orders found</p>";
            return;
        }

        let html = `<p class='success'><b>${data.count} Order(s) Found</b></p>`;

        data.orders.forEach(order => {
            html += `
                <div class="order-card">
                    <p><b>Product:</b> ${order.product}</p>
                    <p><b>Status:</b> ${order.status}</p>
                    <p><b>Courier:</b> ${order.courier}</p>
                    <p><b>AWB:</b> ${order.awb ? order.awb : "Not Assigned"}</p>
                    <p><b>Order Date:</b> ${order.created_at}</p>

                    ${
                        order.tracking_link 
                        ? `<a class="track-btn" href="${order.tracking_link}" target="_blank">Track Order</a>` 
                        : `<span style="color:gray;">Tracking not available</span>`
                    }
                </div>
            `;
        });

        resultDiv.innerHTML = html;

    } catch (error) {
        resultDiv.innerHTML = "<p class='error'>Server error. Try again later.</p>";
        console.log(error);
    }
}
</script>

</body>
</html>
