<!DOCTYPE html>
<html>
<head>
    <title>Order Tracking</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background: white;
            padding: 30px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            text-align: left;
        }

        .error { color: red; }
        .success { color: green; }
        .loading { color: orange; }
    </style>
</head>

<body>

<div class="container">
    <h2>Track Your Order</h2>

    <input type="text" id="inputData" placeholder="Enter Mobile or Email">
    <br>
    <button onclick="searchData()">Search</button>

    <div id="result"></div>
</div>

<script>
async function searchData() {
    let input = document.getElementById("inputData").value.trim();
    let resultDiv = document.getElementById("result");

    if (input === "") {
        resultDiv.innerHTML = "<p class='error'>Please enter mobile or email</p>";
        return;
    }

    resultDiv.innerHTML = "<p class='loading'>Searching...</p>";

    try {
        let response = await fetch("https://sheet-fider-bot.onrender.com/search", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ query: input })
        });

        let data = await response.json();

        if (data.status === "Not Found") {
            resultDiv.innerHTML = "<p class='error'>No order found</p>";
        } 
        else if (data.status === "Error") {
            resultDiv.innerHTML = `<p class='error'>${data.message}</p>`;
        }
        else {
            resultDiv.innerHTML = `
                <p class='success'><b>Status:</b> ${data.status}</p>
                <p><b>Courier:</b> ${data.courier}</p>
                <p><b>AWB:</b> ${data.awb}</p>
                <p><b>Tracking:</b> 
                    ${data.tracking_link ? 
                        `<a href="${data.tracking_link}" target="_blank">Click to Track</a>` 
                        : "Not available"}
                </p>
            `;
        }

    } catch (error) {
        console.log(error);
        resultDiv.innerHTML = "<p class='error'>Server error. Try again later.</p>";
    }
}
</script>

</body>
</html>
